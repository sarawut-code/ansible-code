---
- name: Infrastructure Security - Firewall Management
  hosts: all
  become: yes

  tasks:

    - name: Disable Firewalld (RHEL/CentOS/Oracle)
      when: ansible_facts['os_family'] == "RedHat"
      ansible.builtin.systemd:
        name: firewalld
        state: stopped
        enabled: no

    - name: Disable UFW (Ubuntu/Debian)
      when: ansible_facts['os_family'] == "Debian"
      ansible.builtin.systemd:
        name: ufw
        state: stopped
        enabled: no
