---
- name: Cloudera License Management
  hosts: all
  connection: local
  gather_facts: false

  tasks:

    - name: Fetch Cloudera License via API
      ansible.builtin.uri:
        url: "{{ cm_protocol }}://{{ cm_host }}:{{ cm_port }}/api/v40/cm/license"
        method: GET
        user: "{{ cm_username }}"
        password: "{{ cm_password }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
      register: license_info

    - name: Display License Summary
      ansible.builtin.debug:
        msg:
          - "Cluster Host: {{ cm_host }}"
          - "Protocol: {{ cm_protocol }}"
          - "License Name: {{ license_info.json.name | default('N/A') }}"
          - "Expiration: {{ license_info.json.expiration | default('No Expiration') }}"
          - "Status: {{ 'Valid' if license_info.status == 200 else 'Error' }}"
