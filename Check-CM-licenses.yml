---
- name: "Cloudera License Management"
  hosts: all
  connection: local
  gather_facts: false

  tasks:
    - name: "Fetch Cloudera License via API"
      uri:
        url: "{{ cm_url }}/api/v40/cm/license"
        method: GET
        user: "{{ cm_username }}"      # ตั้งค่าใน AWX Credentials
        password: "{{ cm_password }}"  # ตั้งค่าใน AWX Credentials
        force_basic_auth: yes
        validate_certs: no             # เทียบเท่ากับ -k ใน curl
        status_code: 200
      register: license_info

    - name: "Display License Summary"
      debug:
        msg: 
          - "Cluster IP: {{ inventory_hostname }}"
          - "License Type: {{ license_info.json.type | default('N/A') }}"
          - "Expiration: {{ license_info.json.expiration | default('No Expiration') }}"
          - "Status: {{ 'Valid' if license_info.status == 200 else 'Error' }}"