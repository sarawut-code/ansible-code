---
- name: Collect Health Data
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    memory_threshold: 80
    disk_threshold: 90

  tasks:

    - name: Calculate Memory Usage
      set_fact:
        memory_used_mb: "{{ ansible_memtotal_mb - ansible_memfree_mb }}"
        memory_usage_percent: "{{ ((ansible_memtotal_mb - ansible_memfree_mb) / ansible_memtotal_mb * 100) | round(2) }}"

    - name: Get Root Disk Info
      set_fact:
        root_disk: "{{ ansible_mounts | selectattr('mount','equalto','/') | first }}"

    - name: Calculate Disk Usage
      set_fact:
        disk_usage_percent: "{{ ((root_disk.size_total - root_disk.size_available) / root_disk.size_total * 100) | round(2) }}"

    - name: Set Memory Status
      set_fact:
        memory_status: "{{ 'WARNING' if memory_usage_percent|float > memory_threshold else 'OK' }}"

    - name: Set Disk Status
      set_fact:
        disk_status: "{{ 'CRITICAL' if disk_usage_percent|float > disk_threshold else 'OK' }}"

    - name: Build Per-Host Report
      set_fact:
        host_report: |
          ==========================================
                 LINUX SERVER HEALTH REPORT
          ==========================================
          Hostname         : {{ ansible_hostname }}
          IP Address       : {{ ansible_default_ipv4.address }}
          OS               : {{ ansible_distribution }} {{ ansible_distribution_version }}
          Uptime (days)    : {{ ansible_uptime_seconds // 86400 }}

          CPU Cores        : {{ ansible_processor_vcpus }}

          Memory Total     : {{ ansible_memtotal_mb }} MB
          Memory Used      : {{ memory_used_mb }} MB
          Memory Usage     : {{ memory_usage_percent }} %
          Memory Status    : {{ memory_status }}

          Root Disk Usage  : {{ disk_usage_percent }} %
          Disk Status      : {{ disk_status }}

          ==========================================
          
- name: Generate Final Combined Report
  hosts: localhost
  gather_facts: no

  vars:
    report_path: "/tmp/full_health_report.txt"
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    smtp_user: "sarawut.dank@gmail.com"
    smtp_password: "{{ smtp_password }}"
    to_email: "sarawut.da@maholan.co.th"

  tasks:

    - name: Combine All Host Reports
      set_fact:
        combined_report: |
          {% for host in groups['all'] %}
          {{ hostvars[host].host_report }}

          {% endfor %}

    - name: Save Combined Report
      copy:
        content: "{{ combined_report }}"
        dest: "{{ report_path }}"

    - name: Send Email Once
      mail:
        host: "{{ smtp_server }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_user }}"
        password: "{{ smtp_password }}"
        to: "{{ to_email }}"
        subject: "Enterprise Linux Health Report"
        body: "{{ combined_report }}"
        attach:
          - "{{ report_path }}"
        secure: starttls



