---
- name: Cloudera Impala Configuration Management
  hosts: all
  connection: local
  gather_facts: false

  vars:
    # --- Locked Config (ห้ามแก้) ---
    service_name: "impala"
    role_group: "impala-IMPALAD-BASE"
    target_config: "impalad_memory_limit"

  tasks:
    - name: Fetch Impala Config via API
      ansible.builtin.uri:
        url: "{{ cm_protocol }}://{{ cm_host }}:{{ cm_port }}/api/v40/clusters/{{ cluster_name }}/services/{{ service_name }}/roleConfigGroups/{{ role_group }}/config"
        method: GET
        user: "{{ cm_username }}"
        password: "{{ cm_password }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
      register: impala_api_response

    - name: Set Fact for Target Config
      # ค้นหา Item ที่มี name ตรงกับ target_config จากใน list ['items']
      ansible.builtin.set_fact:
        current_cfg: "{{ impala_api_response.json['items'] | selectattr('name', 'equalto', target_config) | first }}"

    - name: Display mem_limit Summary
      ansible.builtin.debug:
        msg: 
          - "------------------------------------------"
          - "ENVIRONMENT  : {{ env_label }}"
          - "CLUSTER      : {{ cluster_name }}"
          - "CONFIG NAME  : {{ current_cfg.name }}"
          - "VALUE (Bytes): {{ current_cfg.value }}"
          - "VALUE (MB)   : {{ (current_cfg.value | int / 1024 / 1024) | round(2) }} MB"
          - "------------------------------------------"
