---
- name: Cloudera Impala Configuration Management
  hosts: all
  connection: local
  gather_facts: false

  vars:
    # --- Locked Config ---
    service_name: "impala"
    role_group: "impala-IMPALAD-BASE"
    target_config: "mem_limit"

  tasks:
    - name: Fetch Impala Config via API
      ansible.builtin.uri:
        url: "{{ cm_protocol }}://{{ cm_host }}:{{ cm_port }}/api/v40/clusters/{{ cluster_name }}/services/{{ service_name }}/roleConfigGroups/{{ role_group }}/config"
        method: GET
        user: "{{ cm_username }}"
        password: "{{ cm_password }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
      register: impala_api_response

    - name: Show mem_limit value
      ansible.builtin.debug:
        msg: "Config '{{ item.name }}' is set to: {{ item.value | default(item.default) }}"
      loop: "{{ impala_api_response.json.items }}"
      when: item.name == target_config
      loop_control:
        label: "{{ item.name }}"

    - name: Summary for {{ env_label }}
      ansible.builtin.debug:
        msg: "Completed fetching from {{ cm_host }} ({{ cluster_name }})"
