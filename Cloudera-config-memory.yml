---
- name: Cloudera Impala Configuration Check
  hosts: all
  connection: local
  gather_facts: false

  vars:
    service_name: "impala"
    role_group: "impala-IMPALAD-BASE"

  tasks:

    - name: Get Impala Config via API
      ansible.builtin.uri:
        url: "{{ cm_protocol }}://{{ cm_host }}:{{ cm_port }}/api/v40/clusters/{{ cluster_name }}/services/{{ service_name }}/roleConfigGroups/{{ role_group }}/config"
        method: GET
        user: "{{ cm_username }}"
        password: "{{ cm_password }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
      register: impala_config

    - name: Show mem_limit value
      debug:
        msg:
          - "Environment: {{ env_label | default('N/A') }}"
          - "Cluster Host: {{ cm_host }}"
          - "Cluster Name: {{ cluster_name }}"
          - "Impala mem_limit: {{ item.value }}"
      loop: "{{ impala_config.json.items }}"
      when: item.name == "mem_limit"
